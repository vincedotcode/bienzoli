<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: hsl(225, 16%, 5%);
    font-family: 'DM Sans', sans-serif;
    color: hsl(210, 20%, 95%);
    display: flex; flex-direction: column;
    padding: 64px;
    position: relative;
  }

  .glow {
    position: absolute; bottom: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, hsla(24,94%,53%,0.14) 0%, transparent 65%);
    pointer-events: none;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 56px;
  }
  .brand { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; color: hsl(199, 89%, 48%); }
  .tag {
    font-size: 13px; font-weight: 600;
    background: hsla(199,89%,48%,0.1);
    border: 1px solid hsla(199,89%,48%,0.25);
    color: hsl(199, 89%, 55%);
    padding: 6px 16px; border-radius: 100px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }

  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 52px; font-weight: 700;
    letter-spacing: -1.5px; line-height: 1.1;
    margin-bottom: 12px;
  }
  .subhead {
    font-size: 20px; color: hsl(210, 15%, 55%);
    margin-bottom: 48px;
  }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; flex: 1; }

  .step {
    display: flex; gap: 28px; align-items: flex-start;
    position: relative;
  }

  .step-connector {
    display: flex; flex-direction: column; align-items: center;
    min-width: 44px;
  }
  .step-num {
    width: 44px; height: 44px; border-radius: 50%;
    background: hsla(199,89%,48%,0.12);
    border: 1.5px solid hsla(199,89%,48%,0.4);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 500;
    color: hsl(199, 89%, 55%);
    flex-shrink: 0;
  }
  .step-line {
    width: 1.5px; flex: 1;
    background: hsl(225, 10%, 16%);
    margin: 6px 0;
    min-height: 28px;
  }

  .step-body { padding-bottom: 28px; }
  .step-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 20px; font-weight: 600;
    margin-bottom: 4px;
  }
  .step-desc { font-size: 16px; color: hsl(210, 15%, 55%); line-height: 1.5; }
  .step-time {
    display: inline-block; margin-top: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: hsl(24, 94%, 53%);
    background: hsla(24,94%,53%,0.08);
    padding: 2px 10px; border-radius: 4px;
  }

  .footer {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid hsl(225, 10%, 14%);
    padding-top: 28px; margin-top: auto;
  }
  .footer-cta { font-size: 16px; color: hsl(210, 15%, 50%); }
  .footer-cta strong { color: hsl(199, 89%, 48%); }
  .delivery-badge {
    display: flex; align-items: center; gap: 10px;
    background: hsla(199,89%,48%,0.08);
    border: 1px solid hsla(199,89%,48%,0.2);
    padding: 10px 20px; border-radius: 100px;
  }
  .delivery-badge .time { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; color: hsl(199, 89%, 48%); }
  .delivery-badge .label { font-size: 13px; color: hsl(210, 15%, 55%); }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="header">
    <span class="brand">bienzoli</span>
    <span class="tag">Build Process</span>
  </div>

  <div class="headline">{{headline}}</div>
  <div class="subhead">{{subhead}}</div>

  <div class="timeline">
    <div class="step">
      <div class="step-connector">
        <div class="step-num">01</div>
        <div class="step-line"></div>
      </div>
      <div class="step-body">
        <div class="step-title">{{step1Title}}</div>
        <div class="step-desc">{{step1Desc}}</div>
        <span class="step-time">{{step1Time}}</span>
      </div>
    </div>
    <div class="step">
      <div class="step-connector">
        <div class="step-num">02</div>
        <div class="step-line"></div>
      </div>
      <div class="step-body">
        <div class="step-title">{{step2Title}}</div>
        <div class="step-desc">{{step2Desc}}</div>
        <span class="step-time">{{step2Time}}</span>
      </div>
    </div>
    <div class="step">
      <div class="step-connector">
        <div class="step-num">03</div>
        <div class="step-line"></div>
      </div>
      <div class="step-body">
        <div class="step-title">{{step3Title}}</div>
        <div class="step-desc">{{step3Desc}}</div>
        <span class="step-time">{{step3Time}}</span>
      </div>
    </div>
    <div class="step">
      <div class="step-connector">
        <div class="step-num">04</div>
      </div>
      <div class="step-body">
        <div class="step-title">{{step4Title}}</div>
        <div class="step-desc">{{step4Desc}}</div>
        <span class="step-time">{{step4Time}}</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-cta">Website live in → <strong>{{totalTime}}</strong></div>
    <div class="delivery-badge">
      <span class="time">{{totalTime}}</span>
      <span class="label">total delivery</span>
    </div>
  </div>
</body>
</html>
