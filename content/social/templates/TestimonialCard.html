<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: hsl(225, 16%, 5%);
    font-family: 'DM Sans', sans-serif;
    color: hsl(210, 20%, 95%);
    display: flex; flex-direction: column;
    justify-content: center;
    padding: 80px 80px;
    position: relative;
  }

  /* Large decorative quote */
  .quote-mark {
    position: absolute; top: 60px; left: 72px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 240px; font-weight: 700; line-height: 1;
    color: hsla(199,89%,48%,0.08);
    pointer-events: none;
    user-select: none;
  }

  .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, hsla(199,89%,48%,0.08) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Stars */
  .stars {
    display: flex; gap: 8px; margin-bottom: 40px;
  }
  .star {
    width: 32px; height: 32px;
    color: hsl(45, 96%, 60%);
  }

  /* Quote text */
  .quote {
    font-size: 38px; line-height: 1.5;
    font-style: italic;
    color: hsl(210, 20%, 88%);
    margin-bottom: 52px;
    max-width: 920px;
    position: relative; z-index: 1;
  }

  /* Client info */
  .client-row {
    display: flex; align-items: center; gap: 24px;
    margin-bottom: 64px;
  }
  .avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(135deg, hsl(199,89%,48%), hsl(24,94%,53%));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 28px; font-weight: 700;
    color: hsl(225, 16%, 5%);
    flex-shrink: 0;
  }
  .client-info {}
  .client-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 600;
    margin-bottom: 4px;
  }
  .client-biz { font-size: 16px; color: hsl(210, 15%, 55%); }

  /* Package + result */
  .result-row {
    display: flex; gap: 20px;
  }
  .result-chip {
    background: hsla(199,89%,48%,0.1);
    border: 1px solid hsla(199,89%,48%,0.25);
    padding: 12px 24px; border-radius: 100px;
    font-size: 15px; color: hsl(199, 89%, 65%);
    display: flex; align-items: center; gap: 8px;
  }
  .result-chip strong { color: hsl(199, 89%, 48%); font-weight: 600; }

  /* Footer branding */
  .footer-brand {
    position: absolute; bottom: 56px; right: 80px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 700;
    color: hsl(199, 89%, 48%);
    opacity: 0.7;
  }
</style>
</head>
<body>
  <div class="quote-mark">"</div>
  <div class="glow"></div>

  <div class="stars">
    <svg class="star" viewBox="0 0 32 32" fill="currentColor"><path d="M16 2l3.09 9.26H29l-7.8 5.67 2.99 9.26L16 21.52l-8.19 4.67 2.99-9.26L3 11.26h9.91L16 2z"/></svg>
    <svg class="star" viewBox="0 0 32 32" fill="currentColor"><path d="M16 2l3.09 9.26H29l-7.8 5.67 2.99 9.26L16 21.52l-8.19 4.67 2.99-9.26L3 11.26h9.91L16 2z"/></svg>
    <svg class="star" viewBox="0 0 32 32" fill="currentColor"><path d="M16 2l3.09 9.26H29l-7.8 5.67 2.99 9.26L16 21.52l-8.19 4.67 2.99-9.26L3 11.26h9.91L16 2z"/></svg>
    <svg class="star" viewBox="0 0 32 32" fill="currentColor"><path d="M16 2l3.09 9.26H29l-7.8 5.67 2.99 9.26L16 21.52l-8.19 4.67 2.99-9.26L3 11.26h9.91L16 2z"/></svg>
    <svg class="star" viewBox="0 0 32 32" fill="currentColor"><path d="M16 2l3.09 9.26H29l-7.8 5.67 2.99 9.26L16 21.52l-8.19 4.67 2.99-9.26L3 11.26h9.91L16 2z"/></svg>
  </div>

  <div class="quote">"{{quote}}"</div>

  <div class="client-row">
    <div class="avatar">{{clientInitials}}</div>
    <div class="client-info">
      <div class="client-name">{{clientName}}</div>
      <div class="client-biz">{{businessName}}</div>
    </div>
  </div>

  <div class="result-row">
    <div class="result-chip">{{packageName}} package</div>
    <div class="result-chip">Delivered in <strong>{{deliveryTime}}</strong></div>
  </div>

  <div class="footer-brand">bienzoli</div>
</body>
</html>
