<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: hsl(225, 16%, 5%);
    font-family: 'DM Sans', sans-serif;
    color: hsl(210, 20%, 95%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 80px;
    position: relative;
  }

  /* Background grid */
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(hsl(225,10%,14%) 1px, transparent 1px),
      linear-gradient(90deg, hsl(225,10%,14%) 1px, transparent 1px);
    background-size: 60px 60px;
    opacity: 0.4;
    pointer-events: none;
  }

  /* Center glow */
  .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 900px; height: 700px;
    background: radial-gradient(ellipse, hsla(199,89%,48%,0.14) 0%, transparent 65%);
    pointer-events: none;
  }

  /* Brand top */
  .brand-top {
    position: absolute; top: 56px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px; font-weight: 700;
    color: hsl(199, 89%, 48%);
  }

  /* Urgency tag */
  .urgency {
    font-size: 14px; font-weight: 600;
    background: hsla(24,94%,53%,0.12);
    border: 1px solid hsla(24,94%,53%,0.35);
    color: hsl(24, 94%, 60%);
    padding: 8px 20px; border-radius: 100px;
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 36px;
  }

  /* Main headline */
  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 72px; font-weight: 700;
    letter-spacing: -2.5px; line-height: 1.0;
    margin-bottom: 28px;
  }
  .headline em { font-style: normal; color: hsl(199, 89%, 48%); }

  .subhead {
    font-size: 24px; color: hsl(210, 15%, 60%);
    line-height: 1.55; max-width: 800px;
    margin-bottom: 52px;
  }

  /* Feature bullets */
  .features {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    margin-bottom: 56px;
  }
  .feature {
    background: hsl(225, 12%, 10%);
    border: 1px solid hsl(225, 10%, 18%);
    padding: 12px 24px; border-radius: 100px;
    font-size: 16px; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
    color: hsl(210, 20%, 80%);
  }
  .feature .icon { color: hsl(199, 89%, 55%); }

  /* CTA button */
  .cta-button {
    background: hsl(199, 89%, 48%);
    color: hsl(225, 16%, 5%);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 700;
    padding: 20px 56px; border-radius: 100px;
    letter-spacing: -0.3px;
    margin-bottom: 24px;
  }
  .cta-sub {
    font-size: 15px; color: hsl(210, 15%, 45%);
  }
  .cta-sub strong { color: hsl(210, 15%, 65%); }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="brand-top">bienzoli</div>

  <div class="urgency">{{urgencyTag}}</div>

  <div class="headline">{{headline}}</div>
  <div class="subhead">{{subhead}}</div>

  <div class="features">
    <div class="feature"><span class="icon">✓</span> {{feature1}}</div>
    <div class="feature"><span class="icon">✓</span> {{feature2}}</div>
    <div class="feature"><span class="icon">✓</span> {{feature3}}</div>
  </div>

  <div class="cta-button">{{ctaText}}</div>
  <div class="cta-sub">{{ctaSub}} · <strong>bienzoli.com</strong></div>
</body>
</html>
