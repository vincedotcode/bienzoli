<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px; height: 1080px; overflow: hidden;
    background: hsl(225, 16%, 5%);
    font-family: 'DM Sans', sans-serif;
    color: hsl(210, 20%, 95%);
    display: flex; flex-direction: column;
    justify-content: space-between;
    padding: 64px;
    position: relative;
  }

  .glow {
    position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 500px;
    background: radial-gradient(ellipse, hsla(199,89%,48%,0.14) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; }
  .brand { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; color: hsl(199, 89%, 48%); }
  .tip-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; color: hsl(210, 15%, 45%);
    letter-spacing: 1px;
  }

  /* Main content */
  .content { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 32px; }

  .overline {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px; font-weight: 500;
    color: hsl(24, 94%, 53%);
    letter-spacing: 2px; text-transform: uppercase;
  }

  .headline {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 64px; font-weight: 700;
    color: hsl(210, 20%, 95%);
    letter-spacing: -2px; line-height: 1.05;
  }
  .headline em {
    font-style: normal;
    color: hsl(199, 89%, 48%);
  }

  .body-text {
    font-size: 22px; line-height: 1.65;
    color: hsl(210, 15%, 65%);
    max-width: 900px;
  }

  /* Code snippet */
  .code-block {
    background: hsl(225, 12%, 10%);
    border: 1px solid hsl(225, 10%, 18%);
    border-left: 3px solid hsl(199, 89%, 48%);
    border-radius: 10px;
    padding: 24px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px; line-height: 1.6;
    color: hsl(199, 89%, 72%);
  }
  .code-block .comment { color: hsl(225, 10%, 40%); }
  .code-block .keyword { color: hsl(24, 94%, 65%); }

  /* Footer */
  .footer { display: flex; align-items: center; justify-content: space-between; }
  .cta { font-size: 16px; color: hsl(210, 15%, 50%); }
  .cta strong { color: hsl(199, 89%, 48%); }
  .category-tag {
    background: hsla(24,94%,53%,0.1);
    border: 1px solid hsla(24,94%,53%,0.25);
    padding: 8px 18px; border-radius: 100px;
    font-size: 13px; font-weight: 600;
    color: hsl(24, 94%, 53%);
    text-transform: uppercase; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="glow"></div>

  <div class="header">
    <span class="brand">bienzoli</span>
    <span class="tip-num">TIP {{tipNumber}}</span>
  </div>

  <div class="content">
    <div class="overline">{{category}}</div>
    <div class="headline">{{headline}}</div>
    <div class="body-text">{{bodyText}}</div>
    <div class="code-block">{{codeSnippet}}</div>
  </div>

  <div class="footer">
    <div class="cta">Follow for more tips → <strong>bienzoli.com</strong></div>
    <div class="category-tag">{{category}}</div>
  </div>
</body>
</html>
